<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Reveal В· Smitten</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #06060A;
  --text: #fff;
  --text-2: rgba(255,255,255,0.55);
  --text-3: rgba(255,255,255,0.25);
  --border: rgba(255,255,255,0.08);
  --border-2: rgba(255,255,255,0.14);
  --c1:#00E5FF; --c2:#FFB800; --c3:#FF5C8A; --c4:#B8FF4A; --c5:#A78BFA;
  --rgb-c1:0,229,255; --rgb-c2:255,184,0; --rgb-c3:255,92,138; --rgb-c4:184,255,74; --rgb-c5:167,139,250;
}
html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow:hidden; cursor:none; -webkit-font-smoothing:antialiased; }

/* в”Җв”Җ Background в”Җв”Җ */
#constellation { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.5; }
.orbs { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.orb { position:absolute; border-radius:50%; filter:blur(160px); opacity:0.18; }
.orb.o1 { width:600px; height:600px; background:rgba(255,92,138,0.5); top:-15%; left:-10%; animation:drift 28s ease-in-out infinite; }
.orb.o2 { width:500px; height:500px; background:rgba(0,229,255,0.4); bottom:-15%; right:-5%; animation:drift 32s ease-in-out -8s infinite; }
.orb.o3 { width:400px; height:400px; background:rgba(255,184,0,0.4); top:50%; left:50%; transform:translate(-50%,-50%); animation:drift 36s ease-in-out -16s infinite; opacity:0.12; }
@keyframes drift { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,-30px) scale(1.05)} }

body::after {
  content:''; position:fixed; inset:0; opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px; pointer-events:none; z-index:9998;
}

/* в”Җв”Җ Cursor в”Җв”Җ */
#cursor {
  position:fixed; width:14px; height:14px;
  background:rgba(255,255,255,0.9);
  border-radius:50%; pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .2s, height .2s, background .3s;
  mix-blend-mode:difference;
}
#cursor.big { width:42px; height:42px; }

/* в”Җв”Җ Layout в”Җв”Җ */
main {
  position:relative; z-index:1;
  width:100%; height:100vh;
  display:flex; flex-direction:column;
  padding:clamp(1.75rem,3.5vw,3rem) clamp(2rem,5vw,5rem);
  gap:clamp(1.5rem,4vh,3rem);
}

/* в”Җв”Җ Header в”Җв”Җ */
header {
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.brand {
  display:flex; align-items:center; gap:.65rem;
  font-size:.7rem; letter-spacing:.22em; text-transform:uppercase;
  color:var(--c3); font-weight:600;
}
.brand::before, .brand::after {
  content:''; display:block; width:32px; height:1.5px; border-radius:2px;
  background:var(--c3); box-shadow:0 0 8px var(--c3);
}
.title-block { text-align:center; }
.eyebrow { font-size:.7rem; letter-spacing:.24em; text-transform:uppercase; color:var(--text-3); margin-bottom:.4rem; }
.title-block h1 {
  font-family:'Clash Display',sans-serif;
  font-size:clamp(1.6rem,2.6vw,2.2rem);
  font-weight:700; letter-spacing:-.025em; line-height:1;
}
.title-block h1 em {
  font-family:'Fraunces',serif; font-style:italic; font-weight:300;
  color:var(--c3); text-shadow:0 0 30px var(--c3);
}
.progress-pill {
  display:flex; align-items:center; gap:.6em;
  font-size:.78rem; color:var(--text-2);
  padding:.5rem .9rem;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border); border-radius:99px;
  letter-spacing:.04em;
  font-feature-settings:"tnum";
}
.progress-pill strong { color:var(--text); font-family:'Clash Display',sans-serif; font-weight:600; }

/* в”Җв”Җ Teams Grid в”Җв”Җ */
.teams-grid {
  display:grid;
  gap:1rem;
  flex-shrink:0;
}
.teams-grid[data-count="1"] { grid-template-columns:1fr; }
.teams-grid[data-count="2"] { grid-template-columns:repeat(2,1fr); }
.teams-grid[data-count="3"] { grid-template-columns:repeat(3,1fr); }
.teams-grid[data-count="4"] { grid-template-columns:repeat(4,1fr); }
.teams-grid[data-count="5"] { grid-template-columns:repeat(5,1fr); }
.teams-grid[data-count="6"] { grid-template-columns:repeat(3,1fr); }
@media (max-width:900px) { .teams-grid { grid-template-columns:repeat(2,1fr) !important; } }

.team-card {
  position:relative;
  background:rgba(255,255,255,0.025);
  border:1px solid var(--border);
  border-radius:20px;
  padding:1.5rem 1.6rem;
  backdrop-filter:blur(12px);
  display:flex; flex-direction:column;
  gap:1.1rem;
  min-height:210px;
  overflow:hidden;
  transition:border-color .4s, box-shadow .4s, transform .4s;
}
.team-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:var(--team-color); opacity:.7;
}
.team-card.active {
  border-color:var(--team-color);
  box-shadow:0 0 0 1px var(--team-color),
             0 0 50px rgba(var(--team-rgb), 0.35),
             inset 0 0 60px rgba(var(--team-rgb), 0.05);
  transform:translateY(-3px);
}
.team-card.active::before { opacity:1; height:4px; box-shadow:0 0 16px var(--team-color); }

.team-head { display:flex; align-items:flex-start; justify-content:space-between; gap:.5rem; }
.team-no {
  font-size:.62rem; font-weight:700; letter-spacing:.18em;
  text-transform:uppercase; color:var(--team-color);
  margin-bottom:.25rem;
}
.team-title {
  font-family:'Clash Display',sans-serif;
  font-weight:600; font-size:clamp(.95rem,1.4vw,1.15rem);
  letter-spacing:-.01em; line-height:1.15;
  color:var(--text);
}
.team-count {
  font-family:'Clash Display',sans-serif;
  font-size:1.5rem; font-weight:700; line-height:1;
  color:var(--team-color);
  text-shadow:0 0 18px rgba(var(--team-rgb),0.4);
  font-feature-settings:"tnum";
}

.team-members {
  display:flex; flex-wrap:wrap; gap:.4rem;
  align-content:flex-start;
}

/* в”Җв”Җ Room badge (revealed after team reveal) в”Җв”Җ */
.team-room {
  margin-top:auto;
  padding-top:.85rem;
  border-top:1px solid var(--border);
  display:flex; align-items:center; gap:.55em;
  font-size:.85rem; font-weight:600;
  color:var(--team-color);
  letter-spacing:.01em;
  opacity:0; transform:translateY(8px);
  transition:opacity .55s cubic-bezier(0.16,1,0.3,1), transform .55s cubic-bezier(0.16,1,0.3,1);
  min-height:0;
}
.team-room.show { opacity:1; transform:translateY(0); }
.team-room::before {
  content:'рҹ“Қ'; font-size:.95rem; filter:drop-shadow(0 0 8px rgba(var(--team-rgb), .6));
}
.team-card.room-revealing {
  border-color:var(--team-color);
  box-shadow:0 0 0 1px var(--team-color),
             0 0 60px rgba(var(--team-rgb), 0.5),
             inset 0 0 80px rgba(var(--team-rgb), 0.08);
}
.member-chip {
  font-family:'DM Sans',sans-serif; font-weight:500;
  font-size:.85rem; letter-spacing:-.005em;
  padding:.42rem .85rem;
  background:rgba(var(--team-rgb), 0.12);
  border:1px solid rgba(var(--team-rgb), 0.3);
  border-radius:99px;
  color:var(--text);
  white-space:nowrap;
  animation:chipIn .55s cubic-bezier(0.16,1,0.3,1) backwards;
}
@keyframes chipIn {
  from { opacity:0; transform:scale(0.7); filter:blur(6px); }
  to   { opacity:1; transform:scale(1); filter:blur(0); }
}

/* в”Җв”Җ Stage (center) в”Җв”Җ */
.stage {
  flex:1;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative;
  min-height:0;
}
.stage-inner {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:1.6rem;
  text-align:center;
  max-width:90vw;
}
.stage-eyebrow {
  font-size:.72rem; letter-spacing:.24em;
  text-transform:uppercase; color:var(--text-3);
  height:1em;
  transition:color .4s;
}
.stage-eyebrow.active { color:var(--current-color, var(--text-2)); }

.stage-name {
  font-family:'Clash Display',sans-serif;
  font-weight:700;
  font-size:clamp(3rem,9vw,7rem);
  line-height:1;
  letter-spacing:-.035em;
  color:var(--text);
  min-height:1em;
  word-break:break-word;
  transition:color .5s, text-shadow .5s, transform .5s;
  font-feature-settings:"ss01";
  position:relative;
  display:block;
}
.stage-name.empty { color:var(--text-3); font-weight:600; font-size:clamp(1.5rem,3vw,2.2rem); letter-spacing:-.02em; font-style:italic; font-family:'Fraunces',serif; font-weight:300; }
.stage-name.glowing {
  color:var(--current-color, var(--text));
  text-shadow:
    0 0 40px var(--current-color, transparent),
    0 0 90px rgba(var(--current-rgb), 0.4);
}

.stage-team-pill {
  display:inline-flex; align-items:center; gap:.6em;
  padding:.6rem 1.4rem;
  background:rgba(var(--current-rgb), 0.1);
  border:1px solid var(--current-color, var(--border));
  border-radius:99px;
  font-size:.9rem; font-weight:600;
  color:var(--current-color, var(--text-2));
  letter-spacing:.02em;
  opacity:0; transform:translateY(8px);
  transition:opacity .5s .15s, transform .5s .15s;
  align-self:center;
}
.stage-team-pill.show { opacity:1; transform:translateY(0); }

/* в”Җв”Җ Footer hint в”Җв”Җ */
.hint {
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  gap:.7em;
  color:var(--text-3); font-size:.78rem;
  letter-spacing:.14em; text-transform:uppercase;
  height:2em;
  transition:opacity .4s;
}
.hint.hidden { opacity:0; }
.kbd {
  display:inline-flex; align-items:center; justify-content:center;
  padding:.25em .55em;
  border:1px solid var(--text-3);
  border-radius:5px; font-family:'DM Sans',sans-serif;
  font-size:.7rem; line-height:1; letter-spacing:.05em;
}

/* в”Җв”Җ Flying chip (FLIP animation) в”Җв”Җ */
.flying-chip {
  position:fixed; z-index:200;
  font-family:'Clash Display',sans-serif;
  font-weight:700;
  font-size:clamp(3rem,9vw,7rem);
  line-height:1; letter-spacing:-.035em;
  pointer-events:none;
  white-space:nowrap;
  color:var(--current-color);
  text-shadow:
    0 0 40px var(--current-color),
    0 0 90px rgba(var(--current-rgb), 0.4);
}

/* в”Җв”Җ Confetti (done state) в”Җв”Җ */
.confetti-piece {
  position:fixed; width:10px; height:10px;
  pointer-events:none; z-index:100;
  top:50%; left:50%; border-radius:2px;
}

/* в”Җв”Җ Done overlay в”Җв”Җ */
.done-overlay {
  position:fixed; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 50% 50%, rgba(255,92,138,0.08), transparent 60%);
  opacity:0; pointer-events:none;
  transition:opacity .8s;
  text-align:center;
}
.done-overlay.show { opacity:1; }
.done-title {
  font-family:'Clash Display',sans-serif;
  font-weight:700; font-size:clamp(2.5rem,6vw,5rem);
  letter-spacing:-.03em; line-height:1;
}
.done-title em { font-family:'Fraunces',serif; font-style:italic; font-weight:300; color:var(--c3); text-shadow:0 0 60px var(--c3); }
.done-sub { margin-top:1rem; color:var(--text-2); font-size:1rem; letter-spacing:.02em; }

/* в”Җв”Җ Loading в”Җв”Җ */
.loading {
  position:fixed; inset:0; z-index:300;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--bg);
  transition:opacity .5s;
}
.loading.hidden { opacity:0; pointer-events:none; }
.spin {
  width:42px; height:42px;
  border:2px solid rgba(255,255,255,0.08);
  border-top-color:var(--c3);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading p { margin-top:1.2rem; color:var(--text-3); font-size:.72rem; letter-spacing:.18em; text-transform:uppercase; }

@media (max-width:760px) {
  html, body { cursor:default; }
  #cursor { display:none; }
  .teams-grid { grid-template-columns:repeat(2,1fr); }
  main { gap:1rem; padding:1.25rem; }
}
</style>
</head>
<body>

<canvas id="constellation"></canvas>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div id="cursor"></div>

<div class="loading" id="loading">
  <div class="spin"></div>
  <p>Building teamsвҖҰ</p>
</div>

<main id="app" style="display:none">

  <header>
    <div class="brand">Smitten</div>
    <div class="title-block">
      <div class="eyebrow" id="sprint-name">Sprint</div>
      <h1>Team <em>Reveal</em></h1>
    </div>
    <div class="progress-pill"><strong id="progress-current">0</strong> / <span id="progress-total">0</span></div>
  </header>

  <div class="teams-grid" id="teams-grid"></div>

  <div class="stage">
    <div class="stage-inner">
      <div class="stage-eyebrow" id="stage-eyebrow">Click to begin the reveal</div>
      <div class="stage-name empty" id="stage-name">Press space</div>
      <div class="stage-team-pill" id="stage-pill"><span id="pill-icon">в—Ҹ</span><span id="pill-text"></span></div>
    </div>
  </div>

  <div class="hint" id="hint">
    <span class="kbd">Space</span> <span>or click anywhere to reveal</span>
  </div>

</main>

<div class="done-overlay" id="done">
  <div>
    <div class="done-title">Time to <em>ship</em></div>
    <div class="done-sub">Find your team. Find your room. Let's build something great.</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://cfuilfpgsyxgaizzwlee.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_f7EMQpKgX7CefW-HCBiW2Q_9rLSVLRn';

const COLORS = [
  { hex:'#00E5FF', rgb:'0,229,255'   },
  { hex:'#FFB800', rgb:'255,184,0'   },
  { hex:'#FF5C8A', rgb:'255,92,138'  },
  { hex:'#B8FF4A', rgb:'184,255,74'  },
  { hex:'#A78BFA', rgb:'167,139,250' },
  { hex:'#FFD76B', rgb:'255,215,107' },
];

let challenges = [];          // [{id, title}]
let teamColors = {};          // { challengeId: {hex, rgb} }
let teamMembers = {};         // { challengeId: [name1, name2, ...] } вҖ” placed
let teamRooms = {};           // { challengeId: 'Room name' }
let queue = [];               // [{ name, teamId }] вҖ” shuffled, drained as we reveal
let roomQueue = [];           // [{ teamId, room }] вҖ” drained as we reveal rooms
let totalCount = 0;
let state = 'idle';           // idle | busy
let phase = 'members';        // members | rooms | done
let current = null;           // { name, teamId } in flight

// в”Җв”Җ Constellation BG в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
(function () {
  const canvas = document.getElementById('constellation');
  const ctx = canvas.getContext('2d');
  let W, H, pts;
  const N = 60, CONN = 170;
  const resize = () => {
    W = canvas.width = innerWidth; H = canvas.height = innerHeight;
    pts = Array.from({length:N}, () => ({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-0.5)*0.22, vy:(Math.random()-0.5)*0.22,
      r:Math.random()*1.2 + 0.4
    }));
  };
  const tick = () => {
    ctx.clearRect(0,0,W,H);
    for (const p of pts) {
      p.x = (p.x + p.vx + W) % W;
      p.y = (p.y + p.vy + H) % H;
    }
    for (let i=0; i<N; i++) for (let j=i+1; j<N; j++) {
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.hypot(dx,dy);
      if (d < CONN) {
        ctx.strokeStyle = `rgba(255,255,255,${0.05*(1-d/CONN)})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke();
      }
    }
    for (const p of pts) { ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }
    requestAnimationFrame(tick);
  };
  addEventListener('resize', resize); resize(); tick();
})();

// в”Җв”Җ Cursor в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const cursor = document.getElementById('cursor');
addEventListener('mousemove', e => { cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });
addEventListener('mousedown', () => cursor.classList.add('big'));
addEventListener('mouseup', () => cursor.classList.remove('big'));

// в”Җв”Җ Helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m])}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// в”Җв”Җ Load data в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function load() {
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const sprintId = new URLSearchParams(location.search).get('sprint');

  // Sprint config
  let sq = db.from('sprints').select('id,name,challenges,rooms,status');
  sq = sprintId ? sq.eq('id', sprintId).single()
                : sq.eq('status','active').order('created_at',{ascending:false}).limit(1).single();
  const { data: sprint } = await sq;
  if (!sprint) { document.getElementById('loading').querySelector('p').textContent = 'No sprint found'; return; }
  document.getElementById('sprint-name').textContent = sprint.name;
  challenges = (sprint.challenges || []).map((c,i) => ({ id: c.id ?? (i+1), title: c.title || `Challenge ${i+1}` }));

  // Assign colors to each challenge / team
  challenges.forEach((c, i) => { teamColors[c.id] = COLORS[i % COLORS.length]; });

  // Load rooms вҖ” match by teamId, fallback to challenge index
  const roomMap = {};
  (sprint.rooms || []).forEach(r => { if (r && r.teamId != null) roomMap[r.teamId] = r.room; });
  challenges.forEach((c, i) => {
    teamRooms[c.id] = roomMap[c.id] || roomMap[i+1] || `Room ${i+1}`;
  });

  // Votes (filter by sprint)
  let vq = db.from('votes').select('voter_name,first_choice,team_assignment,sprint_id').order('created_at',{ascending:true});
  if (sprint.id) vq = vq.eq('sprint_id', sprint.id);
  const { data: votes } = await vq;
  if (!votes || !votes.length) {
    document.getElementById('loading').querySelector('p').textContent = 'No votes for this sprint yet вҖ” admin needs to be signed in';
    return;
  }

  // Build queue: each voter gets a (name, teamId)
  const ids = challenges.map(c => c.id);
  const items = votes.map(v => {
    const slot = v.team_assignment ?? v.first_choice;
    const team = ids.includes(slot) ? slot : (ids.includes(v.first_choice) ? v.first_choice : ids[0]);
    return { name: v.voter_name, teamId: team };
  });
  queue = shuffle(items);
  totalCount = items.length;
  challenges.forEach(c => { teamMembers[c.id] = []; });

  document.getElementById('progress-total').textContent = totalCount;
  renderTeams();

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
}

// в”Җв”Җ Render teams в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderTeams() {
  const grid = document.getElementById('teams-grid');
  grid.dataset.count = challenges.length;
  grid.innerHTML = challenges.map((c, i) => {
    const color = teamColors[c.id];
    const members = teamMembers[c.id] || [];
    const num = String(i+1).padStart(2,'0');
    return `
      <div class="team-card" data-team-id="${c.id}" style="--team-color:${color.hex};--team-rgb:${color.rgb}">
        <div class="team-head">
          <div>
            <div class="team-no">Team ${num}</div>
            <div class="team-title">${escapeHtml(c.title)}</div>
          </div>
          <div class="team-count" data-team-count-id="${c.id}">${members.length}</div>
        </div>
        <div class="team-members" data-team-members-id="${c.id}">
          ${members.map(m => `<span class="member-chip">${escapeHtml(m)}</span>`).join('')}
        </div>
        <div class="team-room" data-team-room-id="${c.id}">${escapeHtml(teamRooms[c.id] || '')}</div>
      </div>`;
  }).join('');
}

function highlightTeam(teamId) {
  document.querySelectorAll('.team-card').forEach(el => {
    el.classList.toggle('active', String(el.dataset.teamId) === String(teamId));
  });
}

// в”Җв”Җ Reveal flow в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function clearStage() {
  document.documentElement.style.removeProperty('--current-color');
  document.documentElement.style.removeProperty('--current-rgb');
  document.getElementById('stage-eyebrow').classList.remove('active');
  document.getElementById('stage-name').classList.remove('glowing');
  document.getElementById('stage-pill').classList.remove('show');
  highlightTeam(null);
}

async function nextStep() {
  if (state !== 'idle') return;
  if (phase === 'members') return revealMember();
  if (phase === 'rooms')   return revealRoom();
}

async function revealMember() {
  if (queue.length === 0) { startRoomPhase(); return; }

  current = queue.shift();
  const color = teamColors[current.teamId];
  document.documentElement.style.setProperty('--current-color', color.hex);
  document.documentElement.style.setProperty('--current-rgb', color.rgb);
  state = 'busy';
  document.getElementById('stage-eyebrow').textContent = 'Up next';
  document.getElementById('stage-eyebrow').classList.add('active');
  document.getElementById('hint').classList.add('hidden');
  document.getElementById('stage-pill').classList.remove('show');

  // 1. Scramble + settle on the real name (white, no team yet)
  await scrambleThenSettle(current.name);

  // 2. Suspense beat вҖ” let the audience react before we reveal the team
  await delay(3000);

  // 3. Color the name + reveal team pill + highlight target card
  document.getElementById('stage-name').classList.add('glowing');
  const c = challenges.find(x => x.id === current.teamId);
  const idx = challenges.indexOf(c);
  document.getElementById('pill-text').textContent = `${c.title} В· Team ${String(idx+1).padStart(2,'0')}`;
  document.getElementById('stage-pill').classList.add('show');
  highlightTeam(current.teamId);

  // 4. Hold the moment, then send them to their team
  await delay(5000);
  await flyToTeam();
  placeMember();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// в”Җв”Җ Room phase в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function startRoomPhase() {
  phase = 'rooms';
  // Build the room queue in challenge order
  roomQueue = challenges.map(c => ({ teamId: c.id, room: teamRooms[c.id] || '' }));
  // Update stage to invite next click
  const stageName = document.getElementById('stage-name');
  stageName.classList.add('empty');
  stageName.classList.remove('glowing');
  stageName.textContent = 'NowвҖҰ where do you sit?';
  stageName.style.opacity = '';
  document.documentElement.style.removeProperty('--current-color');
  document.documentElement.style.removeProperty('--current-rgb');
  document.getElementById('stage-eyebrow').textContent = 'Teams assembled';
  document.getElementById('stage-eyebrow').classList.remove('active');
  document.getElementById('stage-pill').classList.remove('show');
  highlightTeam(null);
  document.getElementById('hint').querySelector('span:last-child').textContent = 'click to reveal the rooms';
  document.getElementById('hint').classList.remove('hidden');
  // Tiny celebration confetti
  miniConfetti();
}

async function revealRoom() {
  if (roomQueue.length === 0) { showDone(); return; }
  const item = roomQueue.shift();
  const color = teamColors[item.teamId];
  const c = challenges.find(x => x.id === item.teamId);
  const idx = challenges.indexOf(c);

  state = 'busy';
  document.documentElement.style.setProperty('--current-color', color.hex);
  document.documentElement.style.setProperty('--current-rgb', color.rgb);
  document.getElementById('hint').classList.add('hidden');

  // Big center reveal: room name in team color
  const stageName = document.getElementById('stage-name');
  stageName.classList.remove('empty');
  stageName.style.opacity = '';
  document.getElementById('stage-eyebrow').textContent = `Team ${String(idx+1).padStart(2,'0')} В· ${c.title}`;
  document.getElementById('stage-eyebrow').classList.add('active');
  document.getElementById('stage-pill').classList.remove('show');

  // Scramble in the room name
  await scrambleThenSettle(item.room);
  stageName.classList.add('glowing');

  // Highlight the team card with extra glow
  document.querySelectorAll('.team-card').forEach(el => el.classList.remove('room-revealing'));
  const card = document.querySelector(`.team-card[data-team-id="${item.teamId}"]`);
  if (card) card.classList.add('room-revealing');

  // Hold then place into the team card
  await delay(2500);
  // Reveal the room badge in the team card
  if (card) {
    const roomEl = card.querySelector('.team-room');
    if (roomEl) roomEl.classList.add('show');
    card.animate(
      [{ transform: 'scale(1)' }, { transform: 'scale(1.04)' }, { transform: 'scale(1)' }],
      { duration: 600, easing: 'cubic-bezier(0.16,1,0.3,1)' }
    );
  }
  // Clear stage
  stageName.classList.add('empty');
  stageName.classList.remove('glowing');
  stageName.textContent = roomQueue.length ? '' : '';
  document.getElementById('stage-eyebrow').textContent = roomQueue.length ? 'Click for the next room' : '';
  document.getElementById('stage-eyebrow').classList.remove('active');
  if (card) {
    setTimeout(() => card.classList.remove('room-revealing'), 1200);
  }
  document.documentElement.style.removeProperty('--current-color');
  document.documentElement.style.removeProperty('--current-rgb');
  if (roomQueue.length) {
    document.getElementById('hint').querySelector('span:last-child').textContent = 'click to reveal the next room';
    document.getElementById('hint').classList.remove('hidden');
  }

  state = 'idle';

  if (roomQueue.length === 0) {
    setTimeout(() => showDone(), 800);
  }
}

function miniConfetti() {
  const colors = challenges.map(c => teamColors[c.id].hex);
  for (let i=0; i<40; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.background = colors[i % colors.length];
    p.style.left = (50 + (Math.random()-0.5)*30) + '%';
    p.style.top = '40%';
    document.body.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 200 + Math.random() * 350;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 100;
    p.animate([
      { transform: 'translate(-50%,-50%) rotate(0deg)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${(Math.random()-0.5)*720}deg)`, opacity: 0 }
    ], { duration: 1300 + Math.random()*700, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'forwards' });
    setTimeout(() => p.remove(), 2200);
  }
}

// в”Җв”Җ Scramble effect в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const SCRAMBLE_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZГҶГҳГ…Гһ';
function scrambleThenSettle(targetName) {
  const el = document.getElementById('stage-name');
  el.classList.remove('empty');
  return new Promise(resolve => {
    const target = targetName.toUpperCase();
    const len = target.length;
    let frame = 0;
    const totalFrames = 28;            // ~700ms at 16ms/frame, but with raf
    const lockDelay = 14;              // start locking letters after this frame
    const start = performance.now();
    const lockedAt = new Array(len).fill(null);
    // Each char locks at a different frame, in order
    for (let i=0; i<len; i++) lockedAt[i] = lockDelay + Math.floor((i/len) * (totalFrames - lockDelay));
    function tick() {
      const now = performance.now();
      const f = Math.floor((now - start) / 28);
      let display = '';
      for (let i=0; i<len; i++) {
        const ch = target[i];
        if (ch === ' ') { display += ' '; continue; }
        if (f >= lockedAt[i]) { display += ch; }
        else { display += SCRAMBLE_CHARS[Math.floor(Math.random()*SCRAMBLE_CHARS.length)]; }
      }
      el.textContent = display;
      if (f >= totalFrames) {
        el.textContent = target;
        // Don't glow yet вҖ” that happens 3s later in nextStep
        resolve();
        return;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

// в”Җв”Җ Fly animation в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function flyToTeam() {
  return new Promise(resolve => {
    const stageName = document.getElementById('stage-name');
    const teamCard = document.querySelector(`.team-card[data-team-id="${current.teamId}"]`);
    if (!teamCard) { resolve(); return; }

    const startRect = stageName.getBoundingClientRect();
    const endRect = teamCard.getBoundingClientRect();
    const targetX = endRect.left + endRect.width / 2;
    const targetY = endRect.top + endRect.height - 24;

    const clone = document.createElement('div');
    clone.className = 'flying-chip';
    clone.textContent = stageName.textContent;
    clone.style.left = (startRect.left + startRect.width/2) + 'px';
    clone.style.top  = (startRect.top + startRect.height/2) + 'px';
    clone.style.transform = 'translate(-50%, -50%)';
    document.body.appendChild(clone);

    stageName.style.opacity = '0';
    stageName.style.transition = 'opacity .15s';

    const dx = targetX - (startRect.left + startRect.width/2);
    const dy = targetY - (startRect.top + startRect.height/2);

    const anim = clone.animate(
      [
        { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
        { transform: `translate(calc(-50% + ${dx*0.4}px), calc(-50% + ${dy*0.5}px)) scale(0.7)`, opacity: 0.95, offset: 0.55 },
        { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.18)`, opacity: 0 }
      ],
      { duration: 850, easing: 'cubic-bezier(0.45,0.05,0.25,1)' }
    );
    anim.onfinish = () => {
      clone.remove();
      resolve();
    };
  });
}

function placeMember() {
  // Add member chip to team card
  if (!current) return;
  teamMembers[current.teamId] = teamMembers[current.teamId] || [];
  teamMembers[current.teamId].push(current.name);
  // Re-render that team card
  const card = document.querySelector(`.team-card[data-team-id="${current.teamId}"]`);
  if (card) {
    const wrap = card.querySelector('.team-members');
    const chip = document.createElement('span');
    chip.className = 'member-chip';
    chip.textContent = current.name;
    wrap.appendChild(chip);
    card.querySelector('.team-count').textContent = teamMembers[current.teamId].length;
  }
  // Pulse the team card
  const teamCard = document.querySelector(`.team-card[data-team-id="${current.teamId}"]`);
  if (teamCard) {
    teamCard.animate(
      [{ transform: 'translateY(-3px) scale(1)' }, { transform: 'translateY(-3px) scale(1.04)' }, { transform: 'translateY(-3px) scale(1)' }],
      { duration: 520, easing: 'cubic-bezier(0.16,1,0.3,1)' }
    );
  }

  // Reset stage for next reveal
  const stageName = document.getElementById('stage-name');
  stageName.style.opacity = '';
  stageName.classList.add('empty');
  stageName.classList.remove('glowing');
  stageName.textContent = '';

  document.getElementById('stage-eyebrow').textContent = queue.length ? 'Click anywhere to reveal next' : '';
  document.getElementById('stage-eyebrow').classList.remove('active');
  document.getElementById('stage-pill').classList.remove('show');
  highlightTeam(null);

  // Update progress
  const placed = totalCount - queue.length;
  document.getElementById('progress-current').textContent = placed;

  document.getElementById('hint').querySelector('span:last-child').textContent =
    queue.length ? 'or click anywhere to reveal next' : 'all teams revealed';
  document.getElementById('hint').classList.remove('hidden');

  current = null;
  state = 'idle';

  // When all members are placed, transition to room reveal phase.
  if (queue.length === 0) {
    setTimeout(() => startRoomPhase(), 700);
  }
}

// в”Җв”Җ Done в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showDone() {
  document.getElementById('done').classList.add('show');
  document.getElementById('hint').classList.add('hidden');
  launchConfetti();
}

function launchConfetti() {
  const colors = challenges.map(c => teamColors[c.id].hex).concat(['#ffffff']);
  for (let i=0; i<160; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.background = colors[i % colors.length];
    p.style.left = (50 + (Math.random()-0.5)*20) + '%';
    p.style.top = '50%';
    document.body.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 250 + Math.random() * 600;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 200;
    p.animate([
      { transform: 'translate(-50%,-50%) rotate(0deg)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${(Math.random()-0.5)*900}deg)`, opacity: 0 }
    ], { duration: 1700 + Math.random()*900, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'forwards' });
    setTimeout(() => p.remove(), 2800);
  }
}

// в”Җв”Җ Input в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.addEventListener('click', () => {
  if (state === 'idle') nextStep();
});
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (state === 'idle') nextStep();
  }
});

load();
</script>

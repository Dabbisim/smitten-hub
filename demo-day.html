<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Day · Smitten</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');
@import url('https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,300;1,400&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06060A;
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.55);
  --text-faint: rgba(255,255,255,0.2);
  --border: rgba(255,255,255,0.08);
  --c1: #00E5FF;   /* cyan */
  --c2: #FFB800;   /* amber */
  --c3: #FF5C8A;   /* rose */
  --c4: #B8FF4A;   /* lime */
  --c5: #A78BFA;   /* violet */
  --gold: #FFD76B;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); cursor: none; }
body { font-family: 'DM Sans', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

/* ── CUSTOM CURSOR ── */
#cursor {
  position: fixed; z-index: 9999;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--c3);
  pointer-events: none;
  transition: width .25s, height .25s, background .5s, opacity .2s;
  transform: translate(-50%, -50%);
  mix-blend-mode: difference;
}
#cursor.big { width: 48px; height: 48px; }

body::after {
  content: '';
  position: fixed; inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none;
  z-index: 9998;
}

/* ── STAGE LIGHTS (unique to demo-day) ── */
.stage-lights {
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.spotlight {
  position: absolute;
  width: 80vw; height: 80vw;
  max-width: 900px; max-height: 900px;
  border-radius: 50%;
  filter: blur(180px);
  opacity: 0.2;
  animation: drift 22s ease-in-out infinite;
}
.spot-1 { background: radial-gradient(circle, rgba(255,92,138,1), transparent 60%); top: -25%; left: -15%; }
.spot-2 { background: radial-gradient(circle, rgba(255,184,0,0.9), transparent 60%); bottom: -25%; right: -15%; animation-delay: -7s; animation-duration: 28s; }
.spot-3 { background: radial-gradient(circle, rgba(167,139,250,0.8), transparent 60%); top: 35%; left: 40%; animation-delay: -14s; animation-duration: 32s; opacity: 0.15; }
@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33%     { transform: translate(40px,-30px) scale(1.05); }
  66%     { transform: translate(-30px,20px) scale(0.98); }
}

#constellation { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.55; }

/* ── DECK ── */
.deck { position: fixed; inset: 0; z-index: 1; }
.slide {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5vw;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
  text-align: center;
}
.slide.active { opacity: 1; pointer-events: all; }

/* ── SHARED ELEMENTS ── */
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 0.75em;
  font-size: clamp(0.7rem, 1.1vw, 0.82rem);
  font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--c3);
  margin-bottom: 2.5vh;
  opacity: 0;
}
.eyebrow::before, .eyebrow::after {
  content: ''; display: block;
  width: 44px; height: 1.5px;
  background: currentColor; opacity: 0.6;
  box-shadow: 0 0 8px currentColor;
}
.slide.active .eyebrow { animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s forwards; }

.title {
  font-family: 'Clash Display', sans-serif;
  font-weight: 700;
  line-height: 0.88;
  letter-spacing: -0.045em;
  color: var(--text);
  opacity: 0;
}
.title em {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  color: var(--c3);
  text-shadow: 0 0 60px currentColor, 0 0 120px rgba(255,92,138,0.3);
  letter-spacing: -0.01em;
}
.slide.active .title { animation: slideUp 1s cubic-bezier(0.16,1,0.3,1) 0.25s forwards; }

.sub {
  font-size: clamp(1rem, 1.7vw, 1.3rem);
  color: var(--text-dim);
  max-width: 780px;
  line-height: 1.5;
  margin-top: 3vh;
  opacity: 0;
  font-weight: 300;
}
.slide.active .sub { animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.5s forwards; }

@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
/* "Dealt-deck" reveal for lineup cards: each card flies in from a 3D
   angle off-left, tumbles forward, and lands with a small overshoot. */
@keyframes dealCard {
  0% {
    opacity: 0;
    transform:
      rotateY(-72deg) rotateX(18deg) rotateZ(-6deg)
      translate3d(-220px, 40px, -320px) scale(0.55);
    filter: blur(8px);
  }
  35% { opacity: 1; filter: blur(0); }
  78% {
    transform:
      rotateY(6deg) rotateX(-2deg) rotateZ(0.6deg)
      translate3d(0, -8px, 30px) scale(1.04);
    filter: blur(0);
  }
  100% {
    opacity: 1;
    transform:
      rotateY(0) rotateX(0) rotateZ(0)
      translate3d(0, 0, 0) scale(1);
    filter: blur(0);
  }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes pulseGlow {
  0%,100% { box-shadow: 0 0 30px rgba(255,92,138,0.35), 0 0 80px rgba(255,92,138,0.15); }
  50%     { box-shadow: 0 0 50px rgba(255,92,138,0.55), 0 0 120px rgba(255,92,138,0.25); }
}

/* ─────────────────────────────────────────────
   SLIDE 0 — WELCOME
───────────────────────────────────────────── */
#s0 .title {
  font-size: clamp(4rem, 14vw, 14rem);
  background: linear-gradient(90deg, #fff 10%, var(--gold) 35%, #fff 60%, var(--c3) 85%, #fff 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: shimmer 6s linear infinite, slideUp 1s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
}
#s0 .title em {
  background: none;
  -webkit-background-clip: initial;
  color: var(--c3);
  -webkit-text-fill-color: var(--c3);
  text-shadow: 0 0 60px var(--c3), 0 0 120px rgba(255,92,138,0.4);
}
.sprint-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
  margin-top: 4vh;
  padding: 0.5rem 1.1rem;
  background: rgba(255,215,107,0.08);
  border: 1px solid rgba(255,215,107,0.3);
  border-radius: 99px;
  font-size: 0.82rem;
  color: var(--gold);
  font-weight: 500;
  letter-spacing: 0.05em;
  opacity: 0;
}
.sprint-chip::before { content: '●'; font-size: 0.6rem; animation: fadeIn 0.5s infinite alternate; }
.slide.active .sprint-chip { animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.6s forwards; }

.press-hint {
  margin-top: 7vh;
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
  color: var(--text-faint);
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0;
}
.hint-key {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 27px;
  border: 1px solid var(--text-faint);
  border-radius: 6px;
  font-size: 0.75rem;
}
.slide.active .press-hint { animation: fadeIn 1s ease 1.1s forwards; }

/* ─────────────────────────────────────────────
   SLIDE 1 — LINEUP
───────────────────────────────────────────── */
#s1 .title { font-size: clamp(2.6rem, 6vw, 4.8rem); }
#s1 .title em { color: var(--gold); text-shadow: 0 0 50px var(--gold), 0 0 110px rgba(255,215,107,0.3); }

.lineup {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.25rem;
  max-width: 1200px;
  width: 100%;
  margin-top: 6vh;
  perspective: 1400px;
  perspective-origin: 20% 30%;
}
.act {
  position: relative;
  padding: 2rem 1.5rem;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  border-radius: 22px;
  text-align: left;
  opacity: 0;
  overflow: hidden;
  backdrop-filter: blur(10px);
  transform-origin: 50% 60%;
  backface-visibility: hidden;
  transition: transform .4s cubic-bezier(0.16,1,0.3,1), border-color .3s, box-shadow .4s;
}
.act:hover { transform: translateY(-6px); }
.act::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(var(--act-rgb),0.12) 0%, transparent 60%);
  pointer-events: none;
  opacity: 0.9;
}
.act::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--act-color);
  box-shadow: 0 0 24px var(--act-color);
}
/* Per-card stagger is driven by --card-delay (set inline in JS).
   A custom property survives the goTo() animation-reset that would
   otherwise wipe an inline `animation-delay`, so the stagger holds
   across slide navigations. */
.slide.active .act {
  animation: dealCard 1.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  animation-delay: var(--card-delay, 0s);
}

.act-no {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--act-color);
  margin-bottom: 1.2rem;
  display: flex; align-items: center; gap: .6em;
  position: relative; z-index: 1;
}
.act-no-bullet {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(var(--act-rgb),0.12);
  border: 1px solid var(--act-color);
  color: var(--act-color);
  font-family: 'Clash Display', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
}
.act-title {
  font-family: 'Clash Display', sans-serif;
  font-size: clamp(1.3rem, 2.1vw, 1.75rem);
  font-weight: 600;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 1rem;
  min-height: 2.2em;
  position: relative; z-index: 1;
}
.act-meta {
  font-size: 0.78rem;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  padding-top: 1rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 1;
}
.act-meta strong {
  font-family: 'Clash Display', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--act-color);
}
.act-members {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  padding-top: 1rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  position: relative; z-index: 1;
}
.member-chip {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  padding: 0.3rem 0.7rem;
  background: rgba(var(--act-rgb), 0.1);
  border: 1px solid rgba(var(--act-rgb), 0.25);
  border-radius: 99px;
  color: var(--text);
  letter-spacing: -0.005em;
  transition: background .2s;
}
.member-chip:hover { background: rgba(var(--act-rgb), 0.18); }
.act-members-empty {
  font-size: 0.78rem;
  font-style: italic;
  color: var(--text-faint);
  padding-top: 1rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  position: relative; z-index: 1;
}

#s1 .sub { margin-top: 2vh; }

/* Shuffle pill on lineup slide */
.shuffle-btn {
  margin-top: 5vh;
  padding: 0.8rem 1.6rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
  opacity: 0;
  transition: all .25s cubic-bezier(0.16,1,0.3,1);
}
.shuffle-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }
.shuffle-btn .icon { font-size: 1rem; transition: transform .35s; display: inline-block; }
.shuffle-btn:hover .icon { transform: rotate(180deg); }
.slide.active .shuffle-btn {
  animation: fadeIn 1s ease forwards;
  animation-delay: var(--shuffle-delay, 1.5s);
}

/* ─────────────────────────────────────────────
   SLIDE 2 — KICKOFF
───────────────────────────────────────────── */
#s2 .title { font-size: clamp(3.5rem, 10vw, 8.5rem); }
#s2 .title em {
  color: var(--gold);
  text-shadow: 0 0 80px var(--gold), 0 0 160px rgba(255,215,107,0.35);
}
#s2 .eyebrow { color: var(--gold); }
.curtain-cta {
  margin-top: 6vh;
  padding: 1.2rem 3rem;
  background: linear-gradient(135deg, var(--gold), #FFC947);
  color: #0a0a0a;
  border: none;
  border-radius: 99px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: clamp(1rem, 1.5vw, 1.15rem);
  letter-spacing: -0.01em;
  cursor: pointer;
  opacity: 0;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
  animation-fill-mode: forwards;
}
.slide.active .curtain-cta { animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s forwards, pulseGlow 3.5s ease-in-out 2s infinite; }
.curtain-cta:hover { transform: translateY(-3px) scale(1.03); }
.cta-note {
  margin-top: 3vh;
  font-size: 0.82rem;
  color: var(--text-faint);
  letter-spacing: 0.06em;
  opacity: 0;
}
.slide.active .cta-note { animation: fadeIn 1s ease 1.2s forwards; }

/* ─────────────────────────────────────────────
   NAV / COUNTER / FULLSCREEN
───────────────────────────────────────────── */
.nav {
  position: fixed;
  bottom: 2.5vh;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 1.25rem;
}
.nav-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif;
}
.nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: var(--text); }
.nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.nav-dots { display: flex; gap: 0.4rem; }
.nav-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-faint);
  border: none; cursor: pointer;
  transition: all 0.3s;
  padding: 0;
}
.nav-dot.active { width: 24px; border-radius: 6px; background: var(--gold); }
.nav-dot:hover { background: var(--text-dim); }

.counter {
  position: fixed;
  top: 2.5vh; right: 3vw;
  z-index: 100;
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  color: var(--text-faint);
  font-feature-settings: "tnum";
  display: flex; align-items: center; gap: 0.5rem;
}
.counter-current { color: var(--gold); font-weight: 600; }

#btn-fullscreen {
  position: fixed; top: 2.5vh; left: 3vw; z-index: 100;
  width: 38px; height: 38px; border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
#btn-fullscreen:hover { background: rgba(255,255,255,0.08); color: var(--text); }
#btn-fullscreen svg { width: 18px; height: 18px; }

.progress-bar-wrap { position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 100; background: transparent; }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--c3), var(--gold)); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed; width: 10px; height: 10px;
  pointer-events: none; z-index: 50;
  top: 50%; left: 50%;
  border-radius: 2px;
}

/* ─────────────────────────────────────────────
   TEAM PRESENTATION SLIDES (dynamically generated)
───────────────────────────────────────────── */
.team-slide {
  --team-color: var(--c1);
  --team-rgb: 0,229,255;
}
.team-slide .team-position {
  display: inline-flex;
  align-items: baseline;
  gap: 0.18em;
  font-family: 'Clash Display', sans-serif;
  font-weight: 700;
  color: var(--team-color);
  letter-spacing: -0.02em;
  margin-bottom: 1.5vh;
  opacity: 0;
  text-shadow: 0 0 30px rgba(var(--team-rgb), 0.5);
}
.slide.active .team-position { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.05s forwards; }
.team-position-num { font-size: clamp(2rem, 4vw, 3rem); line-height: 1; }
.team-position-suffix { font-size: clamp(0.7rem, 1vw, 0.9rem); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; opacity: 0.85; }

.team-slide .team-title {
  font-family: 'Clash Display', sans-serif;
  font-weight: 700;
  font-size: clamp(2.4rem, 6.5vw, 5.5rem);
  line-height: 0.95;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 2vh;
  max-width: 1100px;
  opacity: 0;
}
.slide.active .team-title { animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.15s forwards; }

.team-slide .team-members {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.45rem;
  max-width: 900px;
  margin-bottom: 4vh;
  opacity: 0;
}
.slide.active .team-members { animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s forwards; }
.team-slide .member-chip {
  font-size: 0.85rem;
  padding: 0.35rem 0.85rem;
  background: rgba(var(--team-rgb), 0.1);
  border: 1px solid rgba(var(--team-rgb), 0.28);
  border-radius: 99px;
  color: var(--text);
}

/* Big timer */
.timer-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5vh;
  opacity: 0;
}
.slide.active .timer-wrap { animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.45s forwards; }

.timer-phase {
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--team-color);
  font-family: 'DM Sans', sans-serif;
  padding: 0.4rem 1.1rem;
  border: 1px solid rgba(var(--team-rgb), 0.4);
  border-radius: 99px;
  background: rgba(var(--team-rgb), 0.08);
}
.timer-phase.qa { color: var(--gold); border-color: rgba(255,215,107,0.4); background: rgba(255,215,107,0.08); }
.timer-phase.done { color: var(--c3); border-color: rgba(255,92,138,0.5); background: rgba(255,92,138,0.12); }

.timer-display {
  font-family: 'Clash Display', sans-serif;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
  font-weight: 700;
  font-size: clamp(7rem, 22vw, 22rem);
  line-height: 0.9;
  letter-spacing: -0.04em;
  color: var(--text);
  text-shadow: 0 0 80px rgba(var(--team-rgb), 0.4), 0 0 160px rgba(var(--team-rgb), 0.2);
  transition: color 0.3s, text-shadow 0.3s;
}
.timer-display.warn {
  color: var(--gold);
  text-shadow: 0 0 80px var(--gold), 0 0 160px rgba(255,215,107,0.45);
}
.timer-display.danger {
  color: var(--c3);
  text-shadow: 0 0 80px var(--c3), 0 0 160px rgba(255,92,138,0.55);
}

.timer-controls {
  display: flex;
  gap: 0.6rem;

/* Color stripe at top */

/* Red blink alarm when Q&A timer hits 0 */

}
@keyframes alarmBlink {

}

@keyframes alarmStripe {

}
.team-slide.alarm .timer-display {

}
@keyframes alarmText {

  50%      { color: #FFFFFF; text-shadow: 0 0 80px #FF3C5A, 0 0 200px #FFFFFF; }
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {

  #cursor { display: none; }
  .slide { padding: 8vw 6vw; }

}

  <svg id="fs-icon-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M8 3v4H4M16 3v4h4M8 21v-4H4M16 21v-4h4"/></svg>

<!-- ═══════ DECK ═══════ -->
<div class="deck">

  <!-- 0 · WELCOME -->

<script src="vendor/supabase-js.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  SLIDE ENGINE
// ═══════════════════════════════════════════════

let SLIDES = ['s0','s1','s2'];
let current = 0;

function buildDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  SLIDES.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'nav-dot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    wrap.appendChild(d);
  });
  document.getElementById('count-total').textContent = SLIDES.length;
}

function goTo(idx) {
  if (idx < 0 || idx >= SLIDES.length) return;
  const prevSlide = document.getElementById(SLIDES[current]);
  prevSlide.classList.remove('active');
  // Stop the timer on the slide we're leaving (so it doesn't keep ticking)
  if (prevSlide.classList.contains('team-slide')) pauseTimer(prevSlide.id);
  current = idx;
  const slide = document.getElementById(SLIDES[current]);
  slide.classList.add('active');
  slide.querySelectorAll('.eyebrow, .title, .sub, .sprint-chip, .press-hint, .act, .curtain-cta, .cta-note, .team-position, .team-title, .team-members, .timer-wrap').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });
  document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i === current));
  document.getElementById('count-current').textContent = current + 1;
  const pct = ((current) / Math.max(1, SLIDES.length - 1)) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === SLIDES.length - 1;
  // On team slides, just (re)render — user presses Start to begin pitch.
  // Pitch->Q&A is still automatic once the timer is running.
  if (slide.classList.contains('team-slide')) {
    const s = ensureTimer(slide.id);
    if (s.phase !== 'idle' && s.phase !== 'done' && !s.ticking) startTimer(slide.id);
    else renderTimer(slide.id);
  }
}

function go(dir) { goTo(current + dir); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') { e.preventDefault(); go(1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); go(-1); }
  else if (e.key === 'Home') goTo(0);
  else if (e.key === 'End')  goTo(SLIDES.length - 1);
  else if (e.key === 'f' || e.key === 'F') { document.getElementById('btn-fullscreen').click(); }
});

document.querySelector('.deck').addEventListener('click', e => {
  if (e.target.closest('.nav') || e.target.closest('.nav-btn') || e.target.closest('.nav-dot') || e.target.closest('.curtain-cta') || e.target.closest('.shuffle-btn') || e.target.closest('.timer-controls') || e.target.closest('.timer-btn')) return;
  go(1);
});

let touchX = 0;
document.addEventListener('touchstart', e => touchX = e.touches[0].clientX, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
}, { passive: true });

// ═══════════════════════════════════════════════
//  FULLSCREEN
// ═══════════════════════════════════════════════
const btnFS = document.getElementById('btn-fullscreen');
const fsEnter = document.getElementById('fs-icon-enter');
const fsExit  = document.getElementById('fs-icon-exit');
function updateFSIcon() {
  const isFS = !!document.fullscreenElement;
  fsEnter.style.display = isFS ? 'none' : '';
  fsExit.style.display  = isFS ? '' : 'none';
}
btnFS.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen().catch(()=>{});
});
document.addEventListener('fullscreenchange', updateFSIcon);

// ═══════════════════════════════════════════════
//  CUSTOM CURSOR
// ═══════════════════════════════════════════════
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
document.addEventListener('mouseenter', () => cursor.style.opacity = '1');
document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
document.querySelectorAll('button, a, .nav-dot, #btn-fullscreen').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('big'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

// ═══════════════════════════════════════════════
//  CONSTELLATION
// ═══════════════════════════════════════════════
(function () {
  const canvas = document.getElementById('constellation');
  const ctx = canvas.getContext('2d');
  let W, H, pts;
  const N = 50, CONN = 180;
  const resize = () => {
    W = canvas.width = innerWidth; H = canvas.height = innerHeight;
    pts = Array.from({length: N}, () => ({ x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-0.5)*0.25, vy: (Math.random()-0.5)*0.25 }));
  };
  const tick = () => {
    ctx.clearRect(0,0,W,H);
    for (const p of pts) { p.x+=p.vx; p.y+=p.vy; if (p.x<0||p.x>W) p.vx*=-1; if (p.y<0||p.y>H) p.vy*=-1; }
    for (let i=0;i<N;i++) for (let j=i+1;j<N;j++) {
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.hypot(dx,dy);
      if (d<CONN) {
        ctx.strokeStyle = `rgba(255,255,255,${0.05*(1-d/CONN)})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke();
      }
    }
    for (const p of pts) { ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.beginPath(); ctx.arc(p.x,p.y,1,0,Math.PI*2); ctx.fill(); }
    requestAnimationFrame(tick);
  };
  addEventListener('resize', resize); resize(); tick();
})();

// ═══════════════════════════════════════════════
//  LOAD SPRINT + POPULATE LINEUP
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://cfuilfpgsyxgaizzwlee.supabase.co';
const SUPABASE_KEY = 'sb_publishable_f7EMQpKgX7CefW-HCBiW2Q_9rLSVLRn';
const COLORS = [
  {hex:'#00E5FF',rgb:'0,229,255'},
  {hex:'#FFB800',rgb:'255,184,0'},
  {hex:'#FF5C8A',rgb:'255,92,138'},
  {hex:'#B8FF4A',rgb:'184,255,74'},
  {hex:'#A78BFA',rgb:'167,139,250'}
];

function escapeH(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m])}

// Pitch / Q&A durations (seconds). Tweak here if you need different windows.
// Sprint 3 ("Third sprint") runs 16 solo demos on a tighter 3 + 1 min clock.
// IS_SPRINT_3 is re-evaluated after the sprint loads (URL may omit ?sprint=).
const SPRINT_3_ID = '766325bc-de77-447b-b235-812f81e50d8a';
let IS_SPRINT_3 = new URLSearchParams(location.search).get('sprint') === SPRINT_3_ID;
let PITCH_SECONDS = IS_SPRINT_3 ? 3 * 60 : 7 * 60;
let QA_SECONDS    = IS_SPRINT_3 ? 1 * 60 : 3 * 60;
const WARN_SECONDS  = 30;     // last-N-seconds amber warning

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function ordinalSuffix(n) {
  const v = n % 100;
  if (v >= 11 && v <= 13) return 'th';
  const last = n % 10;
  return last === 1 ? 'st' : last === 2 ? 'nd' : last === 3 ? 'rd' : 'th';
}

function fmtMMSS(secs) {
  const s = Math.max(0, Math.floor(secs));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;
}

// One state object per team slide, keyed by slide id (e.g. "team-1")
const TIMERS = {};

function ensureTimer(slideId) {
  if (!TIMERS[slideId]) {
    TIMERS[slideId] = {
      phase: 'idle',        // 'idle' | 'pitch' | 'qa' | 'done'
      remaining: PITCH_SECONDS,
      ticking: false,
      tickHandle: null,
    };
  }
  return TIMERS[slideId];
}

// Start the pitch from idle. Q&A starts automatically after pitch hits 0.
function startPitch(slideId) {
  const s = ensureTimer(slideId);
  if (s.phase !== 'idle') return;
  s.phase = 'pitch';
  s.remaining = PITCH_SECONDS;
  startTimer(slideId);
}

// Look one slide ahead in SLIDES and return the team-title text for the
// next team-slide (the upcoming presenter's name). Returns null on the
// final team or if the next slide isn't a team-slide (e.g. wrap-up).
function nextPresenterName(slideId) {
  const idx = SLIDES.indexOf(slideId);
  if (idx < 0) return null;
  const nextId = SLIDES[idx + 1];
  if (!nextId) return null;
  const nextSlide = document.getElementById(nextId);
  if (!nextSlide || !nextSlide.classList.contains('team-slide')) return null;
  const titleEl = nextSlide.querySelector('.team-title');
  const name = titleEl ? titleEl.textContent.trim() : '';
  return name || null;
}

function renderTimer(slideId) {
  const s = ensureTimer(slideId);
  const slide = document.getElementById(slideId);
  if (!slide) return;
  const display = slide.querySelector('.timer-display');
  const phaseEl = slide.querySelector('.timer-phase');
  const playBtn = slide.querySelector('.timer-btn-play');
  const startBtn = slide.querySelector('.timer-btn-start');
  const runControls = slide.querySelector('.timer-run-controls');
  if (display) display.textContent = fmtMMSS(s.remaining);
  // Warn / danger color states
  if (display) {
    display.classList.remove('warn', 'danger');
    if (s.phase === 'done') display.classList.add('danger');
    else if (s.remaining <= WARN_SECONDS && s.remaining > 0 && s.phase !== 'idle') display.classList.add('warn');
  }
  // Phase label
  if (phaseEl) {
    phaseEl.classList.remove('qa', 'done');
    if (s.phase === 'idle') { phaseEl.textContent = `Pitch · ${Math.round(PITCH_SECONDS / 60)} min`; }
    else if (s.phase === 'pitch') { phaseEl.textContent = `Pitch · ${Math.round(PITCH_SECONDS / 60)} min`; }
    else if (s.phase === 'qa') { phaseEl.classList.add('qa'); phaseEl.textContent = `Q & A · ${Math.round(QA_SECONDS / 60)} min`; }
    else if (s.phase === 'done') {
      phaseEl.classList.add('done');
      const next = nextPresenterName(slideId);
      phaseEl.textContent = next ? `Time's up · next presenter is ${next}` : "Time's up · that's a wrap";
    }
  }
  // Show the right control set
  if (startBtn) startBtn.style.display = s.phase === 'idle' ? 'inline-flex' : 'none';
  if (runControls) runControls.style.display = s.phase === 'idle' ? 'none' : 'flex';
  if (playBtn) playBtn.textContent = s.ticking ? '⏸ Pause' : '▶ Resume';
  // Alarm pulse when done
  if (s.phase === 'done') slide.classList.add('alarm');
  else slide.classList.remove('alarm');
}

// Blink "Time's up · next team" for this long, then auto-advance.
const DONE_BLINK_MS = 10000;

// Centralised "we're done with this team" transition. Used both from the
// natural qa→done expiry and from skipPhase when the user jumps to done.
function enterDoneState(slideId) {
  const s = ensureTimer(slideId);
  if (s.tickHandle) { clearInterval(s.tickHandle); s.tickHandle = null; }
  s.phase = 'done';
  s.remaining = 0;
  s.ticking = false;
  // Triple beep when totally done
  beep(880, 0.18, 0.5); setTimeout(() => beep(880, 0.18, 0.5), 350); setTimeout(() => beep(660, 0.4, 0.5), 700);
  // Auto-advance after the blink. Bail out if the user has navigated away
  // or reset the timer in the meantime so we don't yank them around.
  if (s.autoHandle) clearTimeout(s.autoHandle);
  s.autoHandle = setTimeout(() => {
    s.autoHandle = null;
    const slide = document.getElementById(slideId);
    const cur = TIMERS[slideId];
    if (!slide || !cur || cur.phase !== 'done') return;
    if (!slide.classList.contains('active')) return;
    go(1);
  }, DONE_BLINK_MS);
}

function startTimer(slideId) {
  const s = ensureTimer(slideId);
  // Don't auto-start from idle — user must press the "Start pitch" button.
  if (s.phase === 'idle' || s.phase === 'done') { renderTimer(slideId); return; }
  if (s.ticking) return;
  s.ticking = true;
  s.tickHandle = setInterval(() => {
    s.remaining -= 1;
    if (s.remaining <= 0) {
      if (s.phase === 'pitch') {
        // Auto-transition to Q&A
        s.phase = 'qa';
        s.remaining = QA_SECONDS;
        beep(440, 0.2, 0.4);
      } else if (s.phase === 'qa') {
        enterDoneState(slideId);
      }
    }
    renderTimer(slideId);
  }, 1000);
  renderTimer(slideId);
}

function pauseTimer(slideId) {
  const s = TIMERS[slideId];
  if (!s) return;
  if (s.tickHandle) clearInterval(s.tickHandle);
  s.tickHandle = null;
  s.ticking = false;
  // Pause cancels a pending auto-advance — if we're on the done blink and
  // the user navigates away, goTo() calls pauseTimer() and we stop here.
  if (s.autoHandle) { clearTimeout(s.autoHandle); s.autoHandle = null; }
  renderTimer(slideId);
}

function togglePauseTimer(slideId) {
  const s = ensureTimer(slideId);
  if (s.ticking) pauseTimer(slideId); else startTimer(slideId);
}

function resetTimer(slideId) {
  const s = ensureTimer(slideId);
  if (s.tickHandle) clearInterval(s.tickHandle);
  s.tickHandle = null;
  s.ticking = false;
  if (s.autoHandle) { clearTimeout(s.autoHandle); s.autoHandle = null; }
  s.phase = 'idle';
  s.remaining = PITCH_SECONDS;
  renderTimer(slideId);
}

function skipPhase(slideId) {
  const s = ensureTimer(slideId);
  if (s.tickHandle) clearInterval(s.tickHandle);
  s.tickHandle = null;
  s.ticking = false;
  if (s.phase === 'pitch') { s.phase = 'qa'; s.remaining = QA_SECONDS; }
  else if (s.phase === 'qa') { enterDoneState(slideId); }
  renderTimer(slideId);
  if (s.phase !== 'done') startTimer(slideId);
}

// Cheap synth beep — no audio file needed
function beep(freq, duration, volume) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = volume ?? 0.3;
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start();
    setTimeout(() => { osc.stop(); ctx.close(); }, (duration ?? 0.2) * 1000);
  } catch(e) {}
}

// Loaded once on page mount; re-rendered on shuffle.
let LOADED_TEAMS = [];       // [{...challenge, __idx}]
let LOADED_MEMBERS = {};     // { teamId: [voterName, ...] }

async function loadSprint() {
  const sprintId = new URLSearchParams(location.search).get('sprint');
  try {
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false } });
    let q = db.from('sprints').select('id,name,challenges,status');
    q = sprintId ? q.eq('id', sprintId).single() : q.eq('status','active').order('created_at',{ascending:false}).limit(1).single();
    const { data: sprint } = await q;
    if (!sprint) {
      document.getElementById('sprint-chip').textContent = 'No sprint found';
      return;
    }
    document.getElementById('sprint-chip').textContent = sprint.name;
    // Re-check Sprint 3 against the loaded sprint id, so direct loads of
    // demo-day.html (no ?sprint= in URL) still pick up the shorter clock.
    if (sprint.id === SPRINT_3_ID) {
      IS_SPRINT_3 = true;
      PITCH_SECONDS = 3 * 60;
      QA_SECONDS    = 1 * 60;
    }
    const challenges = sprint.challenges || [];

    // Fetch team members (public SELECT under our RLS)
    LOADED_MEMBERS = {};
    try {
      let vq = db.from('votes').select('voter_name,team_assignment,first_choice').order('voter_name',{ascending:true});
      if (sprint.id) vq = vq.eq('sprint_id', sprint.id);
      const { data: votes } = await vq;
      (votes || []).forEach(v => {
        const team = v.team_assignment ?? v.first_choice;
        if (team == null) return;
        (LOADED_MEMBERS[team] = LOADED_MEMBERS[team] || []).push(v.voter_name);
      });
    } catch (e) { /* RLS denied — fall back to empty */ }

    // Tag each challenge with its original index so colors stay anchored
    // to the challenge identity (not its position) across re-shuffles.
    LOADED_TEAMS = challenges.map((c, i) => ({ ...c, __idx: i }));

    // Subtitle (count-aware)
    const n = challenges.length;
    if (n > 0) {
      if (IS_SPRINT_3) {
        document.getElementById('s0-sub').textContent = `${n} demos. ${Math.round(PITCH_SECONDS/60)} min each, ${Math.round(QA_SECONDS/60)} min Q&A.`;
      } else {
        const teamsWord = n === 1 ? 'team' : 'teams';
        document.getElementById('s0-sub').textContent = `${n} ${teamsWord}. ${Math.round(PITCH_SECONDS/60)} min pitch + ${Math.round(QA_SECONDS/60)} min Q&A each.`;
      }
    }

    shuffleAndRebuild();
  } catch(e) {
    console.warn('Sprint load failed:', e);
    document.getElementById('sprint-chip').textContent = 'Sprint unavailable';
  }
}

// Re-shuffle + rebuild both the lineup slide AND the per-team slides.
// Wipes any in-progress timer state since "team 1" might now be a
// different team after shuffle.
function shuffleAndRebuild() {
  if (!LOADED_TEAMS.length) return;
  const ordered = shuffle(LOADED_TEAMS);

  // ── Lineup slide ───────────────────────────────────────────────────
  const lineup = document.getElementById('lineup');
  // Stagger scales with N. With dealCard at 1.15s/card, total reveal lands
  // around ~2.5s for 16 cards and ~1.9s for 5.
  const STAGGER_BASE = 0.45;
  const STAGGER_STEP = Math.min(0.18, 1.05 / Math.max(1, ordered.length));
  lineup.innerHTML = ordered.map((c, pos) => {
    const color = COLORS[c.__idx % COLORS.length];
    const id = c.id ?? (c.__idx + 1);
    const members = LOADED_MEMBERS[id] || [];
    const ordinal = pos + 1;
    const delay = (STAGGER_BASE + pos * STAGGER_STEP).toFixed(2);
    const membersHtml = members.length
      ? `<div class="act-members">${members.map(n => `<span class="member-chip">${escapeH(n)}</span>`).join('')}</div>`
      : `<div class="act-members-empty">Team assembling…</div>`;
    return `
      <div class="act" style="--act-color:${color.hex};--act-rgb:${color.rgb};--card-delay:${delay}s">
        <div class="act-no"><span class="act-no-bullet">${ordinal}</span>${ordinal}${ordinalSuffix(ordinal)} up</div>
        <div class="act-title">${escapeH(c.title || 'Untitled')}</div>
        ${membersHtml}
      </div>`;
  }).join('');

  // Defer the Shuffle pill until after the last card lands (~+0.6s).
  const lastCardLands = STAGGER_BASE + (ordered.length - 1) * STAGGER_STEP + 1.15;
  const shuffleBtn = document.getElementById('shuffle-btn');
  if (shuffleBtn) shuffleBtn.style.setProperty('--shuffle-delay', `${(lastCardLands - 0.5).toFixed(2)}s`);

  // ── Per-team slides ───────────────────────────────────────────────
  const deck = document.querySelector('.deck');
  const kickoff = document.getElementById('s2');
  // Remove existing team slides + timer state (start fresh)
  Array.from(document.querySelectorAll('.team-slide')).forEach(el => el.remove());
  Object.keys(TIMERS).forEach(k => delete TIMERS[k]);

  ordered.forEach((c, pos) => {
    const color = COLORS[c.__idx % COLORS.length];
    const id = c.id ?? (c.__idx + 1);
    const members = LOADED_MEMBERS[id] || [];
    const ordinal = pos + 1;
    const slideId = `team-${ordinal}`;
    const slide = document.createElement('div');
    slide.className = 'slide team-slide';
    slide.id = slideId;
    slide.style.setProperty('--team-color', color.hex);
    slide.style.setProperty('--team-rgb', color.rgb);
    const membersHtml = members.length
      ? `<div class="team-members">${members.map(n => `<span class="member-chip">${escapeH(n)}</span>`).join('')}</div>`
      : '';
    slide.innerHTML = `
      <div class="team-position">
        <span class="team-position-num">${ordinal}</span><span class="team-position-suffix">${ordinalSuffix(ordinal)} up</span>
      </div>
      <h2 class="team-title">${escapeH(c.title || 'Untitled')}</h2>
      ${membersHtml}
      <div class="timer-wrap">
        <div class="timer-phase">Pitch · ${Math.round(PITCH_SECONDS / 60)} min</div>
        <div class="timer-display">${fmtMMSS(PITCH_SECONDS)}</div>
        <div class="timer-controls">
          <button class="timer-btn primary timer-btn-start" onclick="startPitch('${slideId}')">▶ Start</button>
          <div class="timer-run-controls" style="display:none;gap:0.6rem">
            <button class="timer-btn timer-btn-play" onclick="togglePauseTimer('${slideId}')">⏸ Pause</button>
            <button class="timer-btn" onclick="skipPhase('${slideId}')">Skip phase ⏭</button>
            <button class="timer-btn" onclick="resetTimer('${slideId}')">Reset ↻</button>
          </div>
        </div>
      </div>
    `;
    deck.insertBefore(slide, kickoff);
  });

  // Rebuild SLIDES array + nav
  SLIDES = ['s0', 's1', ...ordered.map((_, i) => `team-${i + 1}`), 's2'];
  buildDots();
  document.getElementById('count-total').textContent = SLIDES.length;
  // If the current index is no longer valid, snap to lineup slide
  if (current >= SLIDES.length) goTo(1);
  // Refresh active class to be safe
  document.querySelectorAll('.slide').forEach((s, i) => {
    s.classList.toggle('active', s.id === SLIDES[current]);
  });
  // Replay shuffle-button stagger
  document.querySelectorAll('#s1 .act').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });
}

loadSprint();
buildDots();

// ═══════════════════════════════════════════════
//  CURTAIN CTA — confetti burst
// ═══════════════════════════════════════════════
document.getElementById('curtain-cta').addEventListener('click', launchConfetti);

function launchConfetti() {
  const colors = ['#FFD76B','#FF5C8A','#00E5FF','#FFB800','#B8FF4A','#ffffff'];
  for (let i = 0; i < 140; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.background = colors[i % colors.length];
    p.style.left = (50 + (Math.random()-0.5)*12) + '%';
    p.style.top = '50%';
    document.body.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 280 + Math.random() * 600;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 180;
    p.animate([
      { transform: 'translate(-50%,-50%) rotate(0deg)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${(Math.random()-0.5)*900}deg)`, opacity: 0 }
    ], { duration: 1600 + Math.random()*900, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'forwards' });
    setTimeout(() => p.remove(), 2800);
  }
}

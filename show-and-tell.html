<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Show &amp; Tell · Smitten</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');
@import url('https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,300;1,400&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06060A;
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.55);
  --text-faint: rgba(255,255,255,0.2);
  --border: rgba(255,255,255,0.08);
  --c1: #00E5FF;   /* cyan */
  --c2: #FFB800;   /* amber */
  --c3: #FF5C8A;   /* rose */
  --c4: #B8FF4A;   /* lime */
  --c5: #A78BFA;   /* violet */
  --gold: #FFD76B;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); cursor: none; }
body { font-family: 'DM Sans', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

#cursor {
  position: fixed; z-index: 9999;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--c1);
  pointer-events: none;
  transition: width .25s, height .25s, background .5s, opacity .2s;
  transform: translate(-50%, -50%);
  mix-blend-mode: difference;
}
#cursor.big { width: 48px; height: 48px; }

body::after {
  content: '';
  position: fixed; inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none;
  z-index: 9998;
}

/* Ambient glows tinted to the show-and-tell palette (cyan/violet/lime) */
.stage-lights {
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.spotlight {
  position: absolute;
  width: 80vw; height: 80vw;
  max-width: 900px; max-height: 900px;
  border-radius: 50%;
  filter: blur(180px);
  opacity: 0.2;
  animation: drift 22s ease-in-out infinite;
}
.spot-1 { background: radial-gradient(circle, rgba(0,229,255,1), transparent 60%); top: -25%; left: -15%; }
.spot-2 { background: radial-gradient(circle, rgba(167,139,250,0.9), transparent 60%); bottom: -25%; right: -15%; animation-delay: -7s; animation-duration: 28s; }
.spot-3 { background: radial-gradient(circle, rgba(184,255,74,0.7), transparent 60%); top: 35%; left: 40%; animation-delay: -14s; animation-duration: 32s; opacity: 0.15; }
@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33%     { transform: translate(40px,-30px) scale(1.05); }
  66%     { transform: translate(-30px,20px) scale(0.98); }
}

#constellation { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.55; }

/* ── DECK ── */
.deck { position: fixed; inset: 0; z-index: 1; }
.slide {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5vw;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
  text-align: center;
}
.slide.active { opacity: 1; pointer-events: all; }

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 0.75em;
  font-size: clamp(0.7rem, 1.1vw, 0.82rem);
  font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--c1);
  margin-bottom: 2.5vh;
  opacity: 0;
}
.eyebrow::before, .eyebrow::after {
  content: ''; display: block;
  width: 44px; height: 1.5px;
  background: currentColor; opacity: 0.6;
  box-shadow: 0 0 8px currentColor;
}
.slide.active .eyebrow { animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s forwards; }

.title {
  font-family: 'Clash Display', sans-serif;
  font-weight: 700;
  line-height: 0.88;
  letter-spacing: -0.045em;
  color: var(--text);
  opacity: 0;
}
.title em {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  color: var(--c1);
  text-shadow: 0 0 60px currentColor, 0 0 120px rgba(0,229,255,0.3);
  letter-spacing: -0.01em;
}
.slide.active .title { animation: slideUp 1s cubic-bezier(0.16,1,0.3,1) 0.25s forwards; }

.sub {
  font-size: clamp(1rem, 1.7vw, 1.3rem);
  color: var(--text-dim);
  max-width: 780px;
  line-height: 1.5;
  margin-top: 3vh;
  opacity: 0;
  font-weight: 300;
}
.slide.active .sub { animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.5s forwards; }

@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes pulseGlow {
  0%,100% { box-shadow: 0 0 30px rgba(0,229,255,0.35), 0 0 80px rgba(0,229,255,0.15); }
  50%     { box-shadow: 0 0 50px rgba(0,229,255,0.55), 0 0 120px rgba(0,229,255,0.25); }
}

/* SLIDE 0 — WELCOME */
#s0 .title {
  font-size: clamp(4rem, 14vw, 14rem);
  background: linear-gradient(90deg, #fff 10%, var(--c4) 35%, #fff 60%, var(--c1) 85%, #fff 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: shimmer 6s linear infinite, slideUp 1s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
}
#s0 .title em {
  background: none;
  -webkit-background-clip: initial;
  color: var(--c1);
  -webkit-text-fill-color: var(--c1);
  text-shadow: 0 0 60px var(--c1), 0 0 120px rgba(0,229,255,0.4);
}
.sprint-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
  margin-top: 4vh;
  padding: 0.5rem 1.1rem;
  background: rgba(0,229,255,0.08);
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 99px;
  font-size: 0.82rem;
  color: var(--c1);
  font-weight: 500;
  letter-spacing: 0.05em;
  opacity: 0;
}
.sprint-chip::before { content: '●'; font-size: 0.6rem; animation: fadeIn 0.5s infinite alternate; }
.slide.active .sprint-chip { animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.6s forwards; }

.press-hint {
  margin-top: 7vh;
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
  color: var(--text-faint);
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0;
}
.hint-key {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 27px;
  border: 1px solid var(--text-faint);
  border-radius: 6px;
  font-size: 0.75rem;
}
.slide.active .press-hint { animation: fadeIn 1s ease 1.1s forwards; }

/* SLIDE 1 — RANDOM PITCH ORDER */
#s1 .title { font-size: clamp(2.6rem, 6vw, 4.8rem); }
#s1 .title em { color: var(--c4); text-shadow: 0 0 50px var(--c4), 0 0 110px rgba(184,255,74,0.3); }

.lineup {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.25rem;
  max-width: 1280px;
  width: 100%;
  margin-top: 5vh;
}
.act {
  position: relative;
  padding: 2.2rem 1.5rem 1.6rem;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  border-radius: 22px;
  text-align: left;
  opacity: 0;
  overflow: hidden;
  backdrop-filter: blur(10px);
  transition: transform .4s cubic-bezier(0.16,1,0.3,1), border-color .3s;
}
.act:hover { transform: translateY(-6px); }
.act::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(var(--act-rgb),0.12) 0%, transparent 60%);
  pointer-events: none;
  opacity: 0.9;
}
.act::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--act-color);
  box-shadow: 0 0 24px var(--act-color);
}
.slide.active .act { animation: scaleIn 0.9s cubic-bezier(0.16,1,0.3,1) forwards; }
.slide.active .act:nth-child(1) { animation-delay: 0.5s; }
.slide.active .act:nth-child(2) { animation-delay: 0.7s; }
.slide.active .act:nth-child(3) { animation-delay: 0.9s; }
.slide.active .act:nth-child(4) { animation-delay: 1.1s; }
.slide.active .act:nth-child(5) { animation-delay: 1.3s; }

/* Big ordinal badge ("1st up", etc.) */
.act-position {
  position: absolute;
  top: 1.1rem;
  right: 1.1rem;
  z-index: 2;
  display: inline-flex;
  align-items: baseline;
  gap: 0.18em;
  font-family: 'Clash Display', sans-serif;
  font-weight: 700;
  color: var(--act-color);
  letter-spacing: -0.02em;
  text-shadow: 0 0 20px rgba(var(--act-rgb), 0.5);
}
.act-position-num { font-size: clamp(2.4rem, 4.5vw, 3.6rem); line-height: 1; }
.act-position-suffix { font-size: 0.95rem; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.85; font-weight: 600; }

.act-no {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--act-color);
  margin-top: 0.2rem;
  margin-bottom: 1rem;
  opacity: 0.8;
  position: relative; z-index: 1;
}
.act-title {
  font-family: 'Clash Display', sans-serif;
  font-size: clamp(1.25rem, 2vw, 1.65rem);
  font-weight: 600;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 0.8rem;
  padding-right: 4.5rem; /* leaves space for the position badge */
  min-height: 2.2em;
  position: relative; z-index: 1;
}
.act-members {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  padding-top: 1rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  position: relative; z-index: 1;
}
.member-chip {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  padding: 0.3rem 0.7rem;
  background: rgba(var(--act-rgb), 0.1);
  border: 1px solid rgba(var(--act-rgb), 0.25);
  border-radius: 99px;
  color: var(--text);
  letter-spacing: -0.005em;
  transition: background .2s;
}
.member-chip:hover { background: rgba(var(--act-rgb), 0.18); }
.act-members-empty {
  font-size: 0.78rem;
  font-style: italic;
  color: var(--text-faint);
  padding-top: 1rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  position: relative; z-index: 1;
}

#s1 .sub { margin-top: 2vh; }

/* Re-shuffle pill on the lineup slide */
.shuffle-btn {
  margin-top: 5vh;
  padding: 0.8rem 1.6rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
  opacity: 0;
  transition: all .25s cubic-bezier(0.16,1,0.3,1);
}
.shuffle-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }
.shuffle-btn .icon { font-size: 1rem; transition: transform .35s; }
.shuffle-btn:hover .icon { transform: rotate(180deg); }
.slide.active .shuffle-btn { animation: fadeIn 1s ease 1.7s forwards; }

/* SLIDE 2 — KICKOFF */
#s2 .title { font-size: clamp(3.5rem, 10vw, 8.5rem); }
#s2 .title em {
  color: var(--c4);
  text-shadow: 0 0 80px var(--c4), 0 0 160px rgba(184,255,74,0.35);
}
#s2 .eyebrow { color: var(--c4); }
.curtain-cta {
  margin-top: 6vh;
  padding: 1.2rem 3rem;
  background: linear-gradient(135deg, var(--c1), #6BE5FF);
  color: #0a0a0a;
  border: none;
  border-radius: 99px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: clamp(1rem, 1.5vw, 1.15rem);
  letter-spacing: -0.01em;
  cursor: pointer;
  opacity: 0;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
  animation-fill-mode: forwards;
}
.slide.active .curtain-cta { animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s forwards, pulseGlow 3.5s ease-in-out 2s infinite; }
.curtain-cta:hover { transform: translateY(-3px) scale(1.03); }
.cta-note {
  margin-top: 3vh;
  font-size: 0.82rem;
  color: var(--text-faint);
  letter-spacing: 0.06em;
  opacity: 0;
}
.slide.active .cta-note { animation: fadeIn 1s ease 1.2s forwards; }

/* NAV / COUNTER / FULLSCREEN */
.nav {
  position: fixed;
  bottom: 2.5vh;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 1.25rem;
}
.nav-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif;
}
.nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: var(--text); }
.nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.nav-dots { display: flex; gap: 0.4rem; }
.nav-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-faint);
  border: none; cursor: pointer;
  transition: all 0.3s;
  padding: 0;
}
.nav-dot.active { width: 24px; border-radius: 6px; background: var(--c1); }
.nav-dot:hover { background: var(--text-dim); }

.counter {
  position: fixed;
  top: 2.5vh; right: 3vw;
  z-index: 100;
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  color: var(--text-faint);
  font-feature-settings: "tnum";
  display: flex; align-items: center; gap: 0.5rem;
}
.counter-current { color: var(--c1); font-weight: 600; }

#btn-fullscreen {
  position: fixed; top: 2.5vh; left: 3vw; z-index: 100;
  width: 38px; height: 38px; border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
#btn-fullscreen:hover { background: rgba(255,255,255,0.08); color: var(--text); }
#btn-fullscreen svg { width: 18px; height: 18px; }

.progress-bar-wrap { position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 100; background: transparent; }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--c1), var(--c4)); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

.confetti-piece {
  position: fixed; width: 10px; height: 10px;
  pointer-events: none; z-index: 50;
  top: 50%; left: 50%;
  border-radius: 2px;
}

@media (max-width: 768px) {
  html, body { cursor: default; }
  #cursor { display: none; }
  .slide { padding: 8vw 6vw; }
  #s0 .title { font-size: clamp(3.5rem, 18vw, 6.5rem); }
  #s2 .title { font-size: clamp(3rem, 15vw, 5.5rem); }
  .act-title { padding-right: 3.6rem; }
  .act-position-num { font-size: clamp(2rem, 9vw, 2.8rem); }
}
</style>
</head>
<body>

<div id="cursor"></div>

<div class="stage-lights">
  <div class="spotlight spot-1"></div>
  <div class="spotlight spot-2"></div>
  <div class="spotlight spot-3"></div>
</div>
<canvas id="constellation"></canvas>

<div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>

<button id="btn-fullscreen" title="Toggle fullscreen">
  <svg id="fs-icon-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V3h4M21 7V3h-4M3 17v4h4M21 17v4h-4"/></svg>
  <svg id="fs-icon-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M8 3v4H4M16 3v4h4M8 21v-4H4M16 21v-4h4"/></svg>
</button>

<div class="counter">
  <span class="counter-current" id="count-current">1</span>
  <span>/</span>
  <span id="count-total">3</span>
</div>

<nav class="nav">
  <button class="nav-btn" id="btn-prev" onclick="go(-1)" disabled>←</button>
  <div class="nav-dots" id="nav-dots"></div>
  <button class="nav-btn" id="btn-next" onclick="go(1)">→</button>
</nav>

<!-- ═══════ DECK ═══════ -->
<div class="deck">

  <!-- 0 · WELCOME -->
  <div class="slide active" id="s0">
    <div class="eyebrow"><span></span>Smitten presents<span></span></div>
    <h1 class="title">Show &amp; <em>Tell</em></h1>
    <p class="sub" id="s0-sub">Loading the lineup…</p>
    <div class="sprint-chip" id="sprint-chip">Loading…</div>
    <div class="press-hint"><span class="hint-key">→</span><span>press to begin</span></div>
  </div>

  <!-- 1 · RANDOM PITCH ORDER -->
  <div class="slide" id="s1">
    <div class="eyebrow"><span></span>Random pitch order<span></span></div>
    <h2 class="title">Up <em>next</em></h2>
    <div class="lineup" id="lineup">
      <div style="grid-column:1/-1;color:var(--text-dim);font-style:italic;padding:2rem">Shuffling the deck…</div>
    </div>
    <button class="shuffle-btn" id="shuffle-btn"><span class="icon">↻</span><span>Shuffle again</span></button>
  </div>

  <!-- 2 · KICKOFF -->
  <div class="slide" id="s2">
    <div class="eyebrow"><span></span>Mics on<span></span></div>
    <h2 class="title">Let's <em>pitch</em></h2>
    <button class="curtain-cta" id="curtain-cta">🎤 Kick it off</button>
    <div class="cta-note">Hit the button for a little celebration · press ESC to exit</div>
  </div>

</div>

<script src="vendor/supabase-js.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  SLIDE ENGINE
// ═══════════════════════════════════════════════
const SLIDES = ['s0','s1','s2'];
let current = 0;

function buildDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  SLIDES.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'nav-dot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    wrap.appendChild(d);
  });
  document.getElementById('count-total').textContent = SLIDES.length;
}

function goTo(idx) {
  if (idx < 0 || idx >= SLIDES.length) return;
  document.getElementById(SLIDES[current]).classList.remove('active');
  current = idx;
  const slide = document.getElementById(SLIDES[current]);
  slide.classList.add('active');
  slide.querySelectorAll('.eyebrow, .title, .sub, .sprint-chip, .press-hint, .act, .curtain-cta, .cta-note, .shuffle-btn').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });
  document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i === current));
  document.getElementById('count-current').textContent = current + 1;
  const pct = ((current) / (SLIDES.length - 1)) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === SLIDES.length - 1;
}

function go(dir) { goTo(current + dir); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') { e.preventDefault(); go(1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); go(-1); }
  else if (e.key === 'Home') goTo(0);
  else if (e.key === 'End')  goTo(SLIDES.length - 1);
  else if (e.key === 'f' || e.key === 'F') { document.getElementById('btn-fullscreen').click(); }
  else if (e.key === 'r' || e.key === 'R') { if (current === 1) shuffleAndRender(); }
});

document.querySelector('.deck').addEventListener('click', e => {

// ═══════════════════════════════════════════════
//  CONSTELLATION
// ═══════════════════════════════════════════════
(function () {
  const canvas = document.getElementById('constellation');
  const ctx = canvas.getContext('2d');
  let W, H, pts;
  const N = 50, CONN = 180;
  const resize = () => {
    W = canvas.width = innerWidth; H = canvas.height = innerHeight;
    pts = Array.from({length: N}, () => ({ x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-0.5)*0.25, vy: (Math.random()-0.5)*0.25 }));
  };
  const tick = () => {
    ctx.clearRect(0,0,W,H);
    for (const p of pts) { p.x+=p.vx; p.y+=p.vy; if (p.x<0||p.x>W) p.vx*=-1; if (p.y<0||p.y>H) p.vy*=-1; }
    for (let i=0;i<N;i++) for (let j=i+1;j<N;j++) {
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.hypot(dx,dy);
      if (d<CONN) {
        ctx.strokeStyle = `rgba(255,255,255,${0.05*(1-d/CONN)})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke();
      }
    }
    for (const p of pts) { ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.beginPath(); ctx.arc(p.x,p.y,1,0,Math.PI*2); ctx.fill(); }
    requestAnimationFrame(tick);
  };
  addEventListener('resize', resize); resize(); tick();
})();

// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://cfuilfpgsyxgaizzwlee.supabase.co';
const SUPABASE_KEY = 'sb_publishable_f7EMQpKgX7CefW-HCBiW2Q_9rLSVLRn';
const COLORS = [
  {hex:'#00E5FF',rgb:'0,229,255'},
  {hex:'#FFB800',rgb:'255,184,0'},
  {hex:'#FF5C8A',rgb:'255,92,138'},
  {hex:'#B8FF4A',rgb:'184,255,74'},
  {hex:'#A78BFA',rgb:'167,139,250'}
];

function escapeH(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m])}

// Fisher-Yates in place
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function ordinalSuffix(n) {
  const v = n % 100;
  if (v >= 11 && v <= 13) return 'th';
  const last = n % 10;
  return last === 1 ? 'st' : last === 2 ? 'nd' : last === 3 ? 'rd' : 'th';
}

// Stash the loaded teams + members so the shuffle button can re-render without re-fetching.
let LOADED_TEAMS = [];
let LOADED_TEAM_MEMBERS = {};

function renderLineup(teams, members) {
  const lineup = document.getElementById('lineup');
  if (!teams.length) {
    lineup.innerHTML = `<div style="grid-column:1/-1;color:var(--text-dim);font-style:italic;padding:2rem">No teams to show in this sprint yet.</div>`;
    return;
  }
  const ordered = shuffle(teams);
  lineup.innerHTML = ordered.map((c, i) => {
    // Each team keeps its own challenge color, anchored to challenge id.
    // That way the colors don't dance around between shuffles.
    const anchorIdx = teams.findIndex(t => (t.id ?? t.__idx) === (c.id ?? c.__idx));
    const color = COLORS[anchorIdx % COLORS.length];
    const id = c.id ?? c.__idx;
    const teamMembers = members[id] || [];
    const pos = i + 1;
    const membersHtml = teamMembers.length
      ? `<div class="act-members">${teamMembers.map(n => `<span class="member-chip">${escapeH(n)}</span>`).join('')}</div>`
      : `<div class="act-members-empty">Team assembling…</div>`;
    return `
      <div class="act" style="--act-color:${color.hex};--act-rgb:${color.rgb}">
        <div class="act-position">
          <span class="act-position-num">${pos}</span><span class="act-position-suffix">${ordinalSuffix(pos)}</span>
        </div>
        <div class="act-no">Up ${pos === 1 ? 'first' : pos === ordered.length ? 'last' : 'next'}</div>
        <div class="act-title">${escapeH(c.title || 'Untitled')}</div>
        ${membersHtml}
      </div>`;
  }).join('');
}

function shuffleAndRender() {
  renderLineup(LOADED_TEAMS, LOADED_TEAM_MEMBERS);
  // Replay the staggered scaleIn animation
  const slide = document.getElementById('s1');
  if (!slide.classList.contains('active')) return;
  slide.querySelectorAll('.act').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });
}

async function loadSprint() {
  const sprintId = new URLSearchParams(location.search).get('sprint');
  try {
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let q = db.from('sprints').select('id,name,challenges,status');
    q = sprintId ? q.eq('id', sprintId).single() : q.eq('status','active').order('created_at',{ascending:false}).limit(1).single();
    const { data: sprint } = await q;
    if (!sprint) {
      document.getElementById('sprint-chip').textContent = 'No sprint found';
      document.getElementById('s0-sub').textContent = 'Pitch order unavailable.';
      return;
    }
    document.getElementById('sprint-chip').textContent = sprint.name;

    // One team per challenge. Tag with __idx so anonymous challenges still get stable colors.
    LOADED_TEAMS = (sprint.challenges || []).map((c, i) => ({ ...c, __idx: i }));

    // Try to fetch team members. Public RLS allows SELECT on votes; if denied we just render empty.
    LOADED_TEAM_MEMBERS = {};
    try {
      let vq = db.from('votes').select('voter_name,team_assignment,first_choice').order('voter_name',{ascending:true});
      if (sprint.id) vq = vq.eq('sprint_id', sprint.id);
      const { data: votes } = await vq;
      (votes || []).forEach(v => {
        const team = v.team_assignment ?? v.first_choice;
        if (team == null) return;
        (LOADED_TEAM_MEMBERS[team] = LOADED_TEAM_MEMBERS[team] || []).push(v.voter_name);
      });
    } catch (e) { /* RLS denied — fall back to empty */ }

    renderLineup(LOADED_TEAMS, LOADED_TEAM_MEMBERS);

    const n = LOADED_TEAMS.length;
    if (n > 0) {
      const teamsWord = n === 1 ? 'team' : 'teams';
      document.getElementById('s0-sub').textContent = `${n} ${teamsWord}, one mic, fresh order every shuffle.`;
    }
  } catch(e) {
    console.warn('Sprint load failed:', e);
    document.getElementById('sprint-chip').textContent = 'Sprint unavailable';
    document.getElementById('s0-sub').textContent = 'Pitch order unavailable.';
  }
}

loadSprint();
buildDots();

document.getElementById('shuffle-btn').addEventListener('click', shuffleAndRender);

document.getElementById('curtain-cta').addEventListener('click', launchConfetti);

function launchConfetti() {
  const colors = ['#00E5FF','#A78BFA','#B8FF4A','#FFD76B','#FF5C8A','#ffffff'];
  for (let i = 0; i < 140; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.background = colors[i % colors.length];
    p.style.left = (50 + (Math.random()-0.5)*12) + '%';
    p.style.top = '50%';
    document.body.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 280 + Math.random() * 600;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 180;
    p.animate([
      { transform: 'translate(-50%,-50%) rotate(0deg)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${(Math.random()-0.5)*900}deg)`, opacity: 0 }
    ], { duration: 1600 + Math.random()*900, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'forwards' });
    setTimeout(() => p.remove(), 2800);
  }
}
